<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digimkr Media</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d1d5db;
        }

        /* Premium Dark Gradient Background */
        .gradient-bg {
            background: radial-gradient(circle at top left, rgba(36, 142, 156, 0.15), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(245, 130, 32, 0.15), transparent 40%),
                        radial-gradient(circle at center, rgba(212, 175, 55, 0.05), transparent 50%),
                        #050505;
        }

        .gold-text {
            background: linear-gradient(to right, #B38728, #FBF5B7, #d4af37, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.15em;
        }

        /* Input animations */
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus-within {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
        }

        /* Neon Cursor */
        #neon-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, rgba(36, 142, 156, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transition: width 0.2s, height 0.2s, background 0.2s;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }
        .cursor-hover {
            width: 80px !important;
            height: 80px !important;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.7) 0%, transparent 70%) !important;
        }

        /* Scroll Animations */
        .reveal-text {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .reveal-text.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex flex-col relative overflow-hidden">
    
    <!-- Decorative background element map -->
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#d4af37 1px, transparent 1px); background-size: 50px 50px;"></div>

    <!-- Simple Nav -->
    <nav class="absolute top-0 w-full z-50 p-6">
        <a href="index.html" class="flex items-center gap-4 text-white hover:opacity-80 transition group w-fit">
            <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
            Back to Home
        </a>
    </nav>

    <!-- Login Container -->
    <main class="flex-grow flex items-center justify-center p-4 z-10">
        <div class="w-full max-w-md bg-zinc-900/60 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
            
            <!-- Glow Accent -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#d4af37]/20 rounded-full blur-3xl"></div>
            
            <!-- Logo area -->
            <div class="flex flex-col items-center mb-10">
                <a href="index.html" class="flex flex-col items-center gap-3">
                    <img src="logo.png" alt="Digimkr Media" class="h-12 w-auto group-hover:scale-105 transition-transform">
                    <span class="text-xl font-light gold-text">DIGIMKR MEDIA</span>
                </a>
                <h1 class="text-2xl font-bold text-white mt-8 mb-2">Welcome Back</h1>
                <p class="text-sm text-zinc-500 text-center">Enter your details to access your dashboard.</p>
            </div>

            <!-- Login Form -->
            <form action="#" method="POST" onsubmit="handleLogin(event)" class="space-y-6">
                
                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold mb-2 text-zinc-400">Email Address</label>
                    <div class="relative input-field border border-zinc-700 rounded-xl bg-black/50 flex items-center">
                        <i data-lucide="mail" class="w-5 h-5 text-zinc-500 ml-4 absolute"></i>
                        <input type="email" id="loginEmail" required placeholder="name@company.com" 
                            class="w-full bg-transparent pl-12 pr-4 py-3.5 text-white outline-none rounded-xl placeholder-zinc-600">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-zinc-400">Password</label>
                        <a href="#" class="text-xs text-[#248e9c] hover:text-[#f58220] transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative input-field border border-zinc-700 rounded-xl bg-black/50 flex items-center">
                        <i data-lucide="lock" class="w-5 h-5 text-zinc-500 ml-4 absolute"></i>
                        <input type="password" id="loginPassword" required placeholder="••••••••" 
                            class="w-full bg-transparent pl-12 pr-12 py-3.5 text-white outline-none rounded-xl placeholder-zinc-600">
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 text-zinc-500 hover:text-[#d4af37] transition-colors focus:outline-none">
                            <i id="passwordIcon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-zinc-700 bg-black/50 text-[#d4af37] focus:ring-[#d4af37] focus:ring-offset-0 transition duration-200">
                    <label for="remember" class="ml-2 text-sm text-zinc-400 cursor-pointer select-none">Remember me for 30 days</label>
                </div>

                <!-- Submit -->
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-[#d4af37] to-[#AA771C] text-black font-bold py-4 rounded-xl hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] transition transform hover:-translate-y-1 mt-4">
                    Sign In to Dashboard
                </button>
                
            </form>

            <div class="mt-8 text-center border-t border-zinc-800 pt-6">
                <p class="text-sm text-zinc-500">
                    Don't have an account? 
                    <a href="#" class="text-[#d4af37] font-semibold hover:text-white transition-colors ml-1">Create an account</a>
                </p>
            </div>
            
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-zinc-600 z-10">
        &copy; 2025 Digimkr Media. Secure Client Portal.
    </footer>

    <script>
        // Password Visibility Toggle
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('loginPassword');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                passwordIcon.setAttribute('data-lucide', 'eye');
            }
            
            // Refresh lucide icons
            lucide.createIcons();
        }

        // Admin Login Logic
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;

            // Admin Credentials provided by user
            if (email === 'digimkrmedia@gmail.com' && pass === 'shreyas@2005') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid Credentials. Access restricted to Admin only.');
            }
        }

        // Init Lucide icons
        lucide.createIcons();

        // Neon Cursor Logic
        const cursor = document.createElement('div');
        cursor.id = 'neon-cursor';
        document.body.appendChild(cursor);
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Add hover effect to links and buttons
        const addHoverEffect = () => {
            const hoverElements = document.querySelectorAll('a, button, input, select');
            hoverElements.forEach(el => {
                if(!el.dataset.cursorAttached) {
                    el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
                    el.dataset.cursorAttached = 'true';
                }
            });
        };
        addHoverEffect();
        
        // Re-run if DOM changes
        const observer = new MutationObserver(addHoverEffect);
        observer.observe(document.body, { childList: true, subtree: true });

        // Scroll Reveal Animations for Text
        const revealElements = document.querySelectorAll('h1, h2, h3, p');
        revealElements.forEach(el => el.classList.add('reveal-text'));

        const revealObserver = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    obs.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        revealElements.forEach(el => revealObserver.observe(el));
    </script>
</body>
</html>
